<div class="row justify-content-center">
  <div class="col-md-7">
    <h2 class="mb-4">Register</h2>

    <form [formGroup]="form" (ngSubmit)="register()">
      <div class="mb-3">
        <label class="form-label">Name</label>
        <input class="form-control" formControlName="name" />
      </div>

      <div class="mb-3">
        <label class="form-label">Username</label>
        <input class="form-control" formControlName="username" />
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" formControlName="email" />
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" formControlName="password" />
      </div>

      <div class="mb-3">
        <label class="form-label">Bio</label>
        <textarea class="form-control" rows="3" formControlName="bio"></textarea>
      </div>

      <div class="mb-3">
        <label class="form-label">Skills (séparées par des virgules)</label>
        <input class="form-control" formControlName="skillsInput" placeholder="Angular, TypeScript, API" />
      </div>

      <button class="btn btn-success w-100" type="submit" [disabled]="loading">Register</button>
    </form>

    <div class="alert alert-danger mt-3" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <div class="alert alert-warning mt-3" *ngIf="suggestedUsername">
      Username suggéré : <strong>{{ suggestedUsername }}</strong>
    </div>
  </div>
</div>
