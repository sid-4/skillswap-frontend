<h2 class="mb-4">Job Proposals</h2>

<div class="alert alert-danger" *ngIf="errorMessage">
  {{ errorMessage }}
</div>

<div class="alert alert-success" *ngIf="successMessage">
  {{ successMessage }}
</div>

<div *ngIf="loading">Loading proposals...</div>

<div class="card mb-3" *ngFor="let proposal of proposals">
  <div class="card-body">
    <h5 class="card-title">
      {{ proposal.freelancer?.name }} ({{ proposal.freelancer?.username }})
    </h5>

    <p><strong>Price:</strong> {{ proposal.price }}</p>
    <p><strong>Status:</strong> {{ proposal.status }}</p>
    <p><strong>Cover Letter:</strong> {{ proposal.cover_letter || proposal.message }}</p>

    <button
      class="btn btn-success btn-sm"
      (click)="acceptProposal(proposal.id)"
      [disabled]="proposal.status !== 'pending' || loading"
    >
      Accept Proposal
    </button>
  </div>
</div>
